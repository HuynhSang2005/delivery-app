name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      useCurrentStateFallback:
        description: 'Run current-state fallback path instead of Nx target-state'
        required: false
        default: 'false'

permissions:
  contents: read
  pull-requests: read

jobs:
  security-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependency review gate
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Secret scanning baseline
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull request title policy
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    needs: security-guardrails
    runs-on: ubuntu-latest
    env:
      NX_INTERACTIVE: "false"
      USE_CURRENT_STATE_FALLBACK: ${{ github.event.inputs.useCurrentStateFallback || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Target-state quality gate
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run affected --base=origin/main --head=HEAD

      - name: Target-state e2e gate (blocking)
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run affected:e2e --base=origin/main --head=HEAD

      - name: Shared-platform smoke checks
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run shared:smoke

      - name: Release smoke contracts
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run release:smoke

      - name: Current-state fallback gate
        if: env.USE_CURRENT_STATE_FALLBACK == 'true'
        run: |
          bun run db:up
          cd apps/api
          bun run lint
          bun run test
          bun run build
          cd ../admin-web
          bun run lint
          bun run build
          cd ../mobile
          bun run lint
          cd ../..
          bun run db:down
