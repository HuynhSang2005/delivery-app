name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      useCurrentStateFallback:
        description: 'Run current-state fallback path instead of Nx target-state'
        required: false
        default: 'false'
      fallbackReason:
        description: 'Mandatory note when useCurrentStateFallback=true'
        required: false
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NX_INTERACTIVE: "false"
      USE_CURRENT_STATE_FALLBACK: ${{ github.event.inputs.useCurrentStateFallback || 'false' }}
      FALLBACK_REASON: ${{ github.event.inputs.fallbackReason || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: CI mode summary
        run: |
          echo "mode=${USE_CURRENT_STATE_FALLBACK}"
          echo "base=origin/main"
          echo "head=HEAD"

      - name: Validate fallback policy
        if: env.USE_CURRENT_STATE_FALLBACK == 'true'
        run: |
          if [ -z "$FALLBACK_REASON" ]; then
            echo "Fallback requested but fallbackReason is empty."
            exit 1
          fi
          echo "fallback_reason=$FALLBACK_REASON"

      - name: Target-state quality gate
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run affected --base=origin/main --head=HEAD

      - name: Target-state e2e gate (optional)
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run affected:e2e --base=origin/main --head=HEAD
        continue-on-error: true

      - name: Shared-platform smoke checks
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run shared:smoke

      - name: Current-state fallback gate
        if: env.USE_CURRENT_STATE_FALLBACK == 'true'
        run: |
          bun run db:up
          cd apps/api
          bun run lint
          bun run test
          bun run build
          cd ../admin-web
          bun run lint
          bun run build
          cd ../mobile
          bun run lint
          cd ../..
          bun run db:down
