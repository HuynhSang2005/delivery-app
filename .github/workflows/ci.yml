name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      useCurrentStateFallback:
        description: 'Run current-state fallback path instead of Nx target-state'
        required: false
        default: 'false'

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NX_INTERACTIVE: "false"
      USE_CURRENT_STATE_FALLBACK: ${{ github.event.inputs.useCurrentStateFallback || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Target-state quality gate
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run affected --base=origin/main --head=HEAD

      - name: Target-state e2e gate (optional)
        if: env.USE_CURRENT_STATE_FALLBACK != 'true'
        run: bun run affected:e2e --base=origin/main --head=HEAD
        continue-on-error: true

      - name: Current-state fallback gate
        if: env.USE_CURRENT_STATE_FALLBACK == 'true'
        run: |
          cd apps/api
          bun run lint
          bun run test
          bun run build
          cd ../admin-web
          bun run lint
          bun run build
          cd ../mobile
          bun run lint
